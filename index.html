<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 PLAVE WORLD TOUR [KEEP IT MANIC] IN BANGKOK</title>
    <style>
        /* ==========================================================================
           1. THEME SETTING & VARIABLE
           ========================================================================== */
        :root {
            --neon-red: #ff002b;                  
            --neon-glow: rgba(255, 0, 43, 0.4);
            
            /* พื้นหลังและแผงควบคุมสไตล์ Glassmorphism */
            --glass-outer-bg: rgba(10, 12, 18, 0.8);     
            --glass-inner-left: rgba(6, 8, 14, 0.65);     
            --glass-inner-right: rgba(20, 22, 28, 0.85);  
            
            /* สีตัวอักษร */
            --text-light-main: #f8fafc;            
            --text-light-dim: #94a3b8;               
            
            /* ปุ่ม BUY TICKET */
            --btn-gray: #e2e8f0;                
            --btn-text-black: #090d16;          
        }

        /* ==========================================================================
           2. LAYOUT & BACKGROUND
           ========================================================================== */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('bg.jpg');   
            background-repeat: no-repeat;
            background-position: center;       
            background-size: cover;            
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;             
            align-items: center;                 
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ==========================================================================
           3. CONTAINER DESIGN 
           ========================================================================== */
        .modal-window {
            width: 1350px;                        
            height: 88vh; 
            max-width: 95vw;
            max-height: 88vh;
            background: var(--glass-outer-bg);
            border: 2px solid var(--neon-red);    
            border-radius: 16px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(255, 0, 43, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(16px);          
            -webkit-backdrop-filter: blur(16px);
        }

        /* แถบ Header ด้านบนกรอบ */
        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(255, 0, 43, 0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }
        .modal-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-red);
        }
        .modal-title {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 0;
            text-transform: uppercase;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-buy-ticket-top {
            background-color: var(--btn-gray);
            color: var(--btn-text-black);
            border: 1px solid var(--btn-gray);
            padding: 9px 24px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-buy-ticket-top:hover {
            background-color: transparent;
            color: #ffffff;
            border-color: var(--neon-red);
            box-shadow: 0 0 15px var(--neon-glow);
        }

        .close-window-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #ffffff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .close-window-btn:hover {
            background: var(--neon-red);
            border-color: var(--neon-red);
        }

        /* โครงสร้างเนื้อหาแบ่ง ซ้าย-ขวา */
        .modal-body {
            display: grid;
            grid-template-columns: 280px 1fr;
            flex: 1;
            overflow: hidden; 
        }

        /* เมนูฝั่งซ้าย */
        .left-menu-bar {
            background: var(--glass-inner-left);
            border-right: 1px solid rgba(255, 0, 43, 0.15);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }
        .menu-item {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-light-dim);
            padding: 14px 18px;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .menu-item:hover {
            color: #ffffff;
            background: rgba(255, 0, 43, 0.05);
        }
        .menu-item.active {
            background: rgba(255, 0, 43, 0.15);
            border: 1px solid var(--neon-red);
            color: #ffffff;
            font-weight: bold;
            border-left: 5px solid var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 43, 0.1);
        }

        /* พื้นที่แสดงเนื้อหาฝั่งขวา */
        .right-content-viewer {
            background: var(--glass-inner-right);
            padding: 40px 45px;
            overflow-y: auto;
            position: relative;
        }

        /* ระบบจัดแท็บข้อมูล */
        .tab-content-block {
            display: none;
        }
        .tab-content-block.active {
            display: block;
            animation: glassFadeIn 0.3s ease-out forwards;
        }
        @keyframes glassFadeIn {
            from { opacity: 0; transform: scale(0.99) translateY(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* สไตล์หัวข้อด้านใน */
        .section-title {
            color: var(--text-light-main);
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 14px;
            letter-spacing: 0.5px;
        }

        /* รายการข้อความ */
        .bullet-list {
            list-style: none;
            padding: 0; margin: 0;
        }
        .bullet-list li {
            margin-bottom: 22px;
            line-height: 1.75;
            border-left: 4px solid var(--neon-red);
            padding-left: 18px;
            font-size: 1rem;
            color: var(--text-light-main);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6); 
        }
        .bullet-list strong { 
            color: var(--neon-red); 
            font-weight: 700;
            display: inline-block;
            margin-right: 6px;
        }

        /* จัดการสัดส่วนของรูปภาพในคอนเทนต์ขวา */
        .right-content-viewer img {
            width: 100%;             
            max-width: 100%;         
            height: auto;            
            display: block;
            margin: 0 auto 25px auto;
            border-radius: 8px;
        }

        /* จัดวางส่วนผังที่นั่งให้เต็มบล็อก */
        .seating-map-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 25px;
            margin-top: 10px;
        }
        
        /* ส่วนของหน้าภาพรวม (Overview) */
        .overview-grid {
            display: grid;
            grid-template-columns: 280px 1fr; 
            gap: 30px;
            align-items: start;
        }
        .poster-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .details-box p {
            margin: 16px 0;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-light-main);
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 30px;
        }
        
        /* ดีไซน์ Price Badges ของระบบใหม่ */
        .price-badge {
            display: inline-block; 
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.88rem;
            font-weight: bold;
            color: #fff; 
        }
        .price-badge.price-6800 { background-color: #FF1F00; color: #000; } 
        .price-badge.price-5500 { background-color: #FF7A00; color: #000; } 
        .price-badge.price-3800 { background-color: #FFE57F; color: #000; }
