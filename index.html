<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 PLAVE WORLD TOUR [KEEP IT MANIC] - Concert Guide</title>
    <style>
        /* ==========================================================================
           1. THEME SETTING & VARIABLE (ปรับดีไซน์กระจกรมควันโปร่งแสง เพื่อไม่ให้ตัวอักษรจม)
           ========================================================================== */
        :root {
            --neon-red: #ff002b;                  /* สีแดงแมนิแอคหลักตามเส้นขอบ */
            --neon-glow: rgba(255, 0, 43, 0.4);
            
            /* พื้นหลังและแผงควบคุมสไตล์ Glassmorphism โปร่งแสง หรูหรา มีมิติ */
            --glass-outer-bg: rgba(10, 12, 18, 0.8);     /* ตัวกรอบนอกสีเข้มโปร่งแสง */
            --glass-inner-left: rgba(6, 8, 14, 0.65);     /* เมนูฝั่งซ้าย */
            --glass-inner-right: rgba(20, 22, 28, 0.85);  /* พื้นหลังฝั่งขวา ปรับให้ทึบขึ้นเล็กน้อยเพื่อให้อ่านอักษรง่ายขึ้น */
            
            /* สีตัวอักษร */
            --text-light-main: #f8fafc;            /* สีขาวนวลคมชัด */
            --text-light-dim: #94a3b8;               /* สีเทาอ่อนสำหรับข้อมูลรอง */
            
            /* ปุ่ม BUY TICKET */
            --btn-gray: #e2e8f0;                
            --btn-text-black: #090d16;          
        }

        /* ==========================================================================
           2. LAYOUT & BACKGROUND (ตั้งค่า bg.jpg เป็นพื้นหลังเว็บ และจัดกรอบอยู่กึ่งกลางจอ)
           ========================================================================== */
        body {
            /* นำภาพ bg.jpg มาทำเป็นพื้นหลังเว็บ พร้อมใส่ overlay เลเยอร์สีดำจาง ๆ เพื่อคุมโทนให้กรอบข้อมูลลอยเด่น */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('bg.jpg');   
            background-repeat: no-repeat;
            background-position: center;       
            background-size: cover;            
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;             /* จัดวางกรอบข้อความให้อยู่กึ่งกลางหน้าจอแนวนอน */
            align-items: center;                 /* จัดวางกรอบข้อความให้อยู่กึ่งกลางหน้าจอแนวตั้ง */
            box-sizing: border-box;
            overflow: hidden;
        }

        /* ==========================================================================
           3. CONTAINER DESIGN (ขยายขนาดกรอบให้ใหญ่ขึ้น + เส้นขอบแดง + เอฟเฟกต์กระจกใส)
           ========================================================================== */
        .modal-window {
            width: 1350px;                        /* ขยายความกว้างโครงสร้างตามบรีฟ */
            height: 800px;                        /* แก้ไขความสูงให้พอดีหน้าจอคอมพิวเตอร์ */
            max-width: 100vw;
            max-height: 88vh;
            background: var(--glass-outer-bg);
            border: 2px solid var(--neon-red);    /* เส้นขอบสีแดงตามเรฟวิดีโอ */
            border-radius: 16px;
            /* ใส่เงาหนาและรัศมีเรืองแสงสีแดงรอบกรอบ */
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(255, 0, 43, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(16px);          /* เบลอภาพ bg.jpg ด้านหลังทะลุกระจก */
            -webkit-backdrop-filter: blur(16px);
        }

        /* แถบ Header ด้านบนกรอบ */
        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid rgba(255, 0, 43, 0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
        }
        .modal-title-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-red);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-red);
        }
        .modal-title {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin: 0;
            text-transform: uppercase;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* ย้ายปุ่ม BUY TICKET มาไว้ที่แถวบนขวาตามตำแหน่งที่ต้องการ */
        .btn-buy-ticket-top {
            background-color: var(--btn-gray);
            color: var(--btn-text-black);
            border: 1px solid var(--btn-gray);
            padding: 9px 24px;

            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
